appId: com.storyspark.app
productName: StorySpark
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - from: ../backend/target/storyspark-backend-0.1.0-SNAPSHOT.jar
    to: backend.jar
  - from: ../jre/
    to: jre/
win:
  target: nsis
  icon: resources/icon.png
mac:
  target: dmg
linux:
  target: AppImage
